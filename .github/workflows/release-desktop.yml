# Build ascende.ai desktop (Electron) with bundled ascende-deepagent binary and
# jurisprudence-search standalone. Trigger on version tags, e.g. v1.2.3.
#
# Hardening: verify PyInstaller output, Next standalone layout, and npm lockfiles before packaging.
#
# Private source repos: GITHUB_TOKEN only sees ascende-bundle. Clone of ascende-fronted / deepagent /
# jurisprudence-search needs a PAT with read access to those repos. Add repo secret BUNDLE_CHECKOUT_TOKEN
# (fine-grained: Contents read on each source repo, or classic PAT with repo scope).

name: Release desktop bundle

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout orchestrator
        uses: actions/checkout@v4

      - name: Parse desktop-release.json
        id: pins
        shell: bash
        run: |
          set -euo pipefail
          python3 << 'PY'
          import json
          import os
          import sys

          with open("desktop-release.json", encoding="utf-8") as f:
              cfg = json.load(f)

          required = ("ascende-frontend", "ascende-deepagent", "jurisprudence-search")
          for k in required:
              if k not in cfg:
                  print(f"Missing key {k} in desktop-release.json", file=sys.stderr)
                  sys.exit(1)
              block = cfg[k]
              if not isinstance(block, dict) or "repository" not in block or "ref" not in block:
                  print(f"Invalid block for {k}: need repository and ref", file=sys.stderr)
                  sys.exit(1)

          fe, da, ju = cfg["ascende-frontend"], cfg["ascende-deepagent"], cfg["jurisprudence-search"]
          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a", encoding="utf-8") as g:
              g.write(f"repo_frontend={fe['repository']}\n")
              g.write(f"ref_frontend={fe['ref']}\n")
              g.write(f"repo_deepagent={da['repository']}\n")
              g.write(f"ref_deepagent={da['ref']}\n")
              g.write(f"repo_juris={ju['repository']}\n")
              g.write(f"ref_juris={ju['ref']}\n")
          print("Pins - frontend:", fe["repository"] + "@" + fe["ref"])
          print("Pins - deepagent:", da["repository"] + "@" + da["ref"])
          print("Pins - juris:", ju["repository"] + "@" + ju["ref"])
          PY

      - name: Checkout ascende-frontend
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pins.outputs.repo_frontend }}
          ref: ${{ steps.pins.outputs.ref_frontend }}
          path: ascende-frontend
          token: ${{ secrets.BUNDLE_CHECKOUT_TOKEN != '' && secrets.BUNDLE_CHECKOUT_TOKEN || github.token }}

      - name: Checkout ascende-deepagent
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pins.outputs.repo_deepagent }}
          ref: ${{ steps.pins.outputs.ref_deepagent }}
          path: ascende-deepagent
          token: ${{ secrets.BUNDLE_CHECKOUT_TOKEN != '' && secrets.BUNDLE_CHECKOUT_TOKEN || github.token }}

      - name: Checkout jurisprudence-search
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pins.outputs.repo_juris }}
          ref: ${{ steps.pins.outputs.ref_juris }}
          path: jurisprudence-search
          token: ${{ secrets.BUNDLE_CHECKOUT_TOKEN != '' && secrets.BUNDLE_CHECKOUT_TOKEN || github.token }}

      - name: Verify lockfiles exist
        shell: bash
        run: |
          set -euo pipefail
          test -f ascende-frontend/package-lock.json || { echo "ascende-frontend: missing package-lock.json"; exit 1; }
          test -f jurisprudence-search/package-lock.json || { echo "jurisprudence-search: missing package-lock.json"; exit 1; }

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install & build ascende-backend (PyInstaller)
        shell: bash
        run: |
          set -euo pipefail
          cd ascende-deepagent
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install .
          python -c "from ascende_deepagent.server.app import create_app; create_app()"
          pyinstaller scripts/ascende-backend.spec
          mkdir -p ../ascende-frontend/python-backend
          if [ "${{ matrix.platform }}" = "win" ]; then
            test -f dist/ascende-backend.exe || { echo "PyInstaller did not produce dist/ascende-backend.exe"; ls -la dist || true; exit 1; }
            cp dist/ascende-backend.exe ../ascende-frontend/python-backend/
          else
            test -f dist/ascende-backend || { echo "PyInstaller did not produce dist/ascende-backend"; ls -la dist || true; exit 1; }
            cp dist/ascende-backend ../ascende-frontend/python-backend/
            chmod +x ../ascende-frontend/python-backend/ascende-backend
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            ascende-frontend/package-lock.json
            jurisprudence-search/package-lock.json

      - name: Build jurisprudence-search (standalone)
        shell: bash
        run: |
          set -euo pipefail
          cd jurisprudence-search
          npm ci
          npm run build
          test -f .next/standalone/server.js || { echo "Missing .next/standalone/server.js — check next.config standalone / outputFileTracingRoot"; exit 1; }
          mkdir -p .next/standalone/.next
          cp -R .next/static .next/standalone/.next/static
          if [ -d public ]; then cp -R public .next/standalone/public; fi
          rm -rf ../ascende-frontend/jurisprudence-standalone
          cp -R .next/standalone ../ascende-frontend/jurisprudence-standalone
          test -f ../ascende-frontend/jurisprudence-standalone/server.js || { echo "Copy to jurisprudence-standalone failed"; exit 1; }

      - name: Install & build Electron app
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          set -euo pipefail
          cd ascende-frontend
          npm ci
          npx tsc && npx vite build && npx electron-builder --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}-${{ github.ref_name }}
          path: |
            ascende-frontend/release/*
          if-no-files-found: error

  publish-release:
    name: Attach installers to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: desktop-*-${{ github.ref_name }}
          merge-multiple: true

      - name: Create GitHub Release with assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release-assets/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
